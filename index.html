<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的技术方案知识库</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 深色主题，和你的代码编辑器风格匹配 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <style>
    /* 自定义代码高亮和链接样式 */
    .markdown-section a { color: #42b983; }
    .markdown-section code { background: #282c34; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '技术方案知识库',
      repo: '', // 可以换成你的 GitHub 仓库地址
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3, // 支持三级目录，和你的文件结构匹配
      auto2top: true, // 切换文档自动回到顶部
      search: {
        placeholder: '搜索方案...',
        noData: '未找到匹配的方案',
        pathNamespaces: false,
        maxAge: 86400000 // 搜索缓存一天
      },
      themeColor: '#42b983' // 主题色，和代码高亮匹配
    }
  </script>
  <!-- Docsify 核心 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 搜索插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- 代码高亮 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
</body>
</html>
